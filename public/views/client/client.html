<div class="card">
    <h2 class="card__title">Schedule your appointment</h2>

    <div class="field">
        <label class="field__label" for="select-service">Service</label>
        <select class="field__select" id="select-service"></select>
    </div>

    <div class="field">
        <label class="field__label" for="select-professional">Professional</label>
        <select class="field__select" id="select-professional"></select>
    </div>

    <div class="field">
        <label class="field__label" for="appointment-datetime">Date & Time</label>
        <input class="field__input" type="datetime-local" id="appointment-datetime">
    </div>

    <div class="field">
        <label class="field__label" for="client-name">Your Name</label>
        <input class="field__input" type="text" id="client-name" placeholder="Ex: Carlos Silva">
    </div>

    <div id="btn-confirm-container"></div>
</div>
