<div class="card">
    <h2 class="card__title">Teste de Autenticação</h2>

    <div class="field">
        <label class="field__label" for="auth-email">E-mail</label>
        <input class="field__input" type="email" id="auth-email" placeholder="email@teste.com">
    </div>

    <div class="field">
        <label class="field__label" for="auth-password">Senha</label>
        <input class="field__input" type="password" id="auth-password" placeholder="Senha">
    </div>

    <div id="btn-login-container"></div>

    <hr>

    <div id="btn-me-container"></div>
    <div id="btn-logout-container"></div>

    <pre id="auth-result"></pre>
</div>
