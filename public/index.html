<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agendamento Web</title>
    <style>
        
    </style>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <button onclick="toggleView('cliente')">Visão Cliente</button>
    <button onclick="toggleView('admin')">Visão Admin</button>

    <hr>

    <div id="view-cliente" class="card">
        <h2>Agende seu horário</h2>
        <select id="select-barbeiro"></select>
        <input type="datetime-local" id="data-hora">
        <input type="text" id="nome-cliente" placeholder="Seu Nome">
        <button onclick="fazerAgendamento()">Confirmar Agendamento</button>
    </div>

    <div id="view-admin" class="card hidden">
        <h2>Configurações do Estabelecimento</h2>
        <label>Tempo médio de corte (min):</label>
        <input type="number" id="tempo-corte" value="30">
        <label>Profissionais (separados por vírgula):</label>
        <input type="text" id="lista-profissionais" placeholder="Ex: João, Maria">
        <button onclick="salvarConfig()">Salvar Configurações</button>
        
        <h3>Próximos Agendamentos</h3>
        <ul id="lista-admin"></ul>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/src/app.js"></script>
</body>
</html>
