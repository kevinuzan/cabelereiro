<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agendamento Web</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/modal.css">
    <!-- <link rel="stylesheet" href="/css/style.css"> -->
</head>

<body>
    <div class="app-container">
        <header class="header">
            <h1>CABELEREIRO <span>GUIKE</span></h1>
        </header>

        <div class="nav-tabs">
            <button id="btn-view-cliente" class="active" onclick="toggleView('cliente')">AGENDAR</button>
            <button id="btn-view-admin" onclick="toggleView('admin')">ADMIN</button>
        </div>

        <main>
            <section id="view-cliente" class="card">
                <h2 class="section-title">Novo Agendamento</h2>
                <div class="form-group">
                    <label>O que vamos fazer hoje?</label>
                    <select id="select-servico"></select>
                </div>
                <div class="form-group">
                    <label>Profissional</label>
                    <select id="select-barbeiro"></select>
                </div>
                <div class="form-group">
                    <label>Data e Horário</label>
                    <input type="datetime-local" id="data-hora">
                </div>
                <div class="form-group">
                    <label>Seu Nome</label>
                    <input type="text" id="cliente-nome" placeholder="Seu nome">
                </div>
                <button id="btn-agendar" class="btn-primary">CONFIRMAR AGENDAMENTO</button>
            </section>

            <section id="view-admin" class="card hidden">
                <h2 class="section-title">Painel de Controle</h2>

                <div class="nav-tabs sub-nav" style="background: var(--input); margin-bottom: 20px;">
                    <button id="tab-btn-equipe" class="active" onclick="mudarSubTab('equipe')">EQUIPE</button>
                    <button id="tab-btn-servicos" onclick="mudarSubTab('servicos')">SERVIÇOS</button>
                    <button id="tab-btn-agenda" onclick="mudarSubTab('agenda')">AGENDA</button>
                </div>

                <div id="subview-equipe" class="subview">
                    <div class="admin-flex-layout">
                        <div class="admin-form-side">
                            <h3 class="section-title">Cadastrar Profissional</h3>
                            <div class="form-group">
                                <label>Nome</label>
                                <input type="text" id="novo-nome-prof">
                            </div>
                            <div class="form-group">
                                <label>Serviços que realiza:</label>
                                <div id="container-checkbox-servicos" class="checkbox-grid">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Foto</label>
                                <input type="file" id="input-foto-prof" accept="image/*" style="display: none;">
                                <button type="button" onclick="document.getElementById('input-foto-prof').click()"
                                    class="btn-nav" style="width: 100%; border-style: dashed;">📸 Selecionar
                                    Foto</button>
                                <div id="preview-foto" class="preview-img"></div>
                            </div>
                            <button id="btn-add-prof" class="btn-add">Adicionar Profissional</button>
                        </div>
                        <div class="admin-list-side">
                            <h3 class="section-title">Profissionais Atuais</h3>
                            <div id="lista-profissionais-cards"></div>
                        </div>
                    </div>
                </div>

                <div id="subview-servicos" class="subview hidden">
                    <div class="admin-flex-layout">
                        <div class="admin-form-side">
                            <h3 class="section-title">Novo Serviço</h3>
                            <div class="form-group">
                                <label>Modelos</label>
                                <select onchange="selecionarTemplateServico(this.value)">
                                    <option value="">-- Selecione --</option>
                                    <option value="corte">Corte Masculino</option>
                                    <option value="barba">Barba</option>
                                    <option value="mecha">Mecha / Coloração</option>
                                    <option value="manicure">Manicure</option>
                                    <option value="pedicure">Pedicure</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Nome</label>
                                <input type="text" id="novo-nome-servico">
                            </div>
                            <div class="form-group">
                                <label>Duração (min)</label>
                                <input type="number" id="nova-duracao-servico">
                            </div>
                            <div class="form-group">
                                <label>Foto</label>
                                <input type="file" id="input-foto-servico" accept="image/*" style="display: none;">
                                <button type="button" onclick="document.getElementById('input-foto-servico').click()"
                                    class="btn-nav" style="width: 100%; border-style: dashed;">📸 Foto Serviço</button>
                                <div id="preview-foto-servico" class="preview-img"></div>
                            </div>
                            <button id="btn-add-servico" class="btn-add">Adicionar Serviço</button>
                        </div>
                        <div class="admin-list-side">
                            <h3 class="section-title">Serviços Atuais</h3>
                            <div id="lista-servicos-cards"></div>
                        </div>
                    </div>
                </div>

                <div id="subview-agenda" class="subview hidden">
                    <h3 class="section-title">Agendamentos</h3>
                    <ul id="lista-admin" class="agenda-list"></ul>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">
                <button id="btn-salvar" class="btn-primary" style="box-shadow: 0 0 20px rgba(243, 143, 24, 0.4);">💾
                    SALVAR</button>
            </section>
        </main>
    </div>

    <div id="modal-edicao" class="hidden"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
        <div
            style="background: #1a1a1a; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid #333;">
            <h3 id="modal-titulo" style="margin-bottom: 20px;">Editar</h3>
            <div id="campos-edicao"></div>
            <div class="modal-footer">
                <button onclick="fecharModal()" class="btn-secondary">Cancelar</button>
                <button id="btn-confirmar-edicao" class="btn-primary" style="flex: 1; margin-top: 0;">Salvar</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/src/app.js"></script>
</body>

</html>
